<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Flores Amarillas</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg, #e7c98a, #f5e2b8, #e7c98a);
            font-family: Arial, sans-serif;
        }

        .card {
            width: 900px;
            height: 450px;
            background: #f3e6d3;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: flex;
        }

        /* Flores CSS */
        .flowers-top,
        .flowers-bottom {
            position: absolute;
            width: 100%;
            height: 70px;
            left: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .flowers-top {
            top: 0;
        }

        .flowers-bottom {
            bottom: 0;
        }

        .flower {
            position: relative;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
        }

        .flower::before,
        .flower::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background: gold;
            border-radius: 50%;
        }

        .flower::before {
            top: -10px;
            left: 0;
        }

        .flower::after {
            left: -10px;
            top: 0;
        }

        .text {
            width: 40%;
            padding: 80px 30px;
            color: #5a4a3a;
            font-size: 18px;
        }

        .timer {
            position: absolute;
            bottom: 80px;
            left: 30px;
            font-size: 14px;
        }

        .heart-container {
            width: 60%;
            position: relative;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
                opacity: 1;
            }

            50% {
                transform: translateY(-20px);
                opacity: 0.7;
            }

            100% {
                transform: translateY(0px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="flowers-top">
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
        </div>

        <div class="flowers-bottom">
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
        </div>

        <div class="text">
            <p><b>Flores Amarillas para el amor de mi vida</b></p>
            <p>Si pudiera elegir un lugar, sería a tu lado siempre.</p>
            <p>Te amo y adoro muchisimo mi pulguita.</p>
        </div>

        <div class="timer" id="timer"></div>

        <div class="heart-container" id="heart"></div>
    </div>

    <script>
        // Corazón con partículas
        const heart = document.getElementById("heart");

        function heartShape(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x, y };
        }

        for (let i = 0; i < 250; i++) {
            let t = Math.random() * Math.PI * 2;
            let pos = heartShape(t);

            let particle = document.createElement("div");
            particle.className = "particle";
            particle.style.left = (pos.x * 8 + 250) + "px";
            particle.style.top = (-pos.y * 8 + 180) + "px";
            particle.style.animationDelay = (Math.random() * 4) + "s";

            heart.appendChild(particle);
        }

        // Contador
        const startDate = new Date("2025-04-19 00:00:00");

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerHTML =
                `Mi amor por ti comenzó hace...<br>
            ${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
        }

        setInterval(updateTimer, 1000);
    </script>

</body>

</html>
